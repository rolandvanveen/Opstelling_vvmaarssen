<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VV Maarssen Opstelling</title>
<style>
  /* --- BASIS OPMAAK & TYPOGRAFIE --- */
  :root {
    --primary-blue: #0056b3; 
    --accent-green: #28a745;
    --bg-gray: #f4f7f9;
    --text-dark: #333;
  }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: var(--bg-gray); 
    padding: 15px; 
    margin: 0; 
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }
  h2 { text-align: center; font-size: 24px; margin-bottom: 20px; color: var(--primary-blue); font-weight: 700; }
  
  /* --- INVULFORMULIER STYLING --- */
  .setup-container { 
    background: white; padding: 20px; border-radius: 16px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; 
  }
  .player-group { 
    background: white; padding: 10px; border-radius: 12px;
    margin-bottom: 15px; border: 1px solid #eef2f5; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
  }
  .player-row { display: flex; gap: 10px; margin-bottom: 8px; }
  input[type="text"], select { 
    padding: 12px; border: 1px solid #dce4ec; border-radius: 8px; 
    flex: 1; font-size: 16px; background: #fdfdfd;
    transition: border-color 0.2s; appearance: none; 
  }
  input[type="text"]:focus, select:focus { border-color: var(--primary-blue); outline: none; }

  /* Moderne Pinch Hitter Checkbox */
  .pinch-wrapper { display: flex; align-items: center; margin-top: 5px; }
  .pinch-checkbox-label {
    display: flex; align-items: center; background: #f0f2f5;
    padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
    color: #666; cursor: pointer; transition: all 0.3s ease;
  }
  .pinch-checkbox-label input { display: none; }
  .pinch-checkbox-label .icon { margin-right: 8px; font-size: 16px; filter: grayscale(100%); transition: filter 0.3s;}
  .pinch-checkbox-label input:checked + span { background: #e6f4ea; color: var(--accent-green); }
  .pinch-checkbox-label input:checked + span .icon { filter: grayscale(0%); }

  /* Knoppen */
  .main-btn { 
    width: 100%; padding: 18px; 
    background: linear-gradient(to bottom, var(--primary-blue), #004a99);
    color: white; border: none; border-radius: 12px; 
    font-size: 18px; font-weight: 700; margin-top: 15px; 
    box-shadow: 0 4px 10px rgba(0, 86, 179, 0.3); cursor: pointer;
  }
  .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0, 86, 179, 0.3); }
  
  .reset-btn {
    width: 100%; padding: 15px; background: white; color: var(--primary-blue);
    border: 2px solid var(--primary-blue); border-radius: 12px;
    font-size: 16px; font-weight: 600; margin-top: 30px; margin-bottom: 30px;
  }
  
  .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 15px; display: none; }

  /* --- VELD STYLING --- */
  .opstelling-wrapper { 
    background: white; padding: 20px 10px; border-radius: 16px; 
    margin-bottom: 40px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); 
    page-break-inside: avoid; 
  }
  .kwart-titel { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 20px; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 1px;}
  
  .subs-header { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; text-align: center; }
  .sub-item { background: #f8f9fa; padding: 8px 15px; border-radius: 8px; border: 1px solid #e9ecef; }
  .sub-item span { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
  .sub-item strong { display: block; font-size: 14px; color: var(--text-dark); }

  .pitch {
    position: relative; width: 100%; max-width: 400px; aspect-ratio: 3 / 4; margin: 0 auto;
    background: repeating-linear-gradient(0deg, #38a04c, #38a04c 12.5%, #41b357 12.5%, #41b357 25%);
    border: 4px solid white; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
    box-sizing: border-box; overflow: hidden; border-radius: 4px;
  }
  
  /* Veldlijnen */
  .line-center { position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.8); }
  .circle-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; }
  .box-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 50px; border: 3px solid rgba(255,255,255,0.8); border-top: none; }
  .box-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 50px; border: 3px solid rgba(255,255,255,0.8); border-bottom: none; }
  
  /* Logo in het midden */
  .logo {
    position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; text-align: center;
    border: 4px solid #222; font-weight: 900; font-size: 12px; color: black; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1;
  }

  /* Spelers (Shirtjes) */
  .player { position: absolute; transform: translate(-50%, -50%); text-align: center; z-index: 2; }
  .shirt {
    width: 46px; height: 42px; background: white; border: 2px solid #333; border-radius: 6px 6px 0 0;
    margin: 0 auto; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .shirt::after {
    content: ''; position: absolute; top: 4px; left: -12px; width: 66px; height: 16px;
    background: white; border: 2px solid #333; z-index: -1; border-radius: 4px;
  }
  .shirt.keeper { background: var(--primary-blue); border-color: #003f82; }
  .shirt.keeper::after { background: var(--primary-blue); border-color: #003f82; }
  
  .player-name { 
    font-weight: 800; font-size: 12px; margin-top: -32px; color: #222; z-index: 5; position: relative;
    text-shadow: 1px 1px 0px white, -1px -1px 0px white, 1px -1px 0px white, -1px 1px 0px white; 
    text-transform: uppercase;
  }
  .keeper-name { 
    color: white; margin-top: -32px; position: relative; font-weight: 800; font-size: 12px; z-index: 5;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8); text-transform: uppercase;
  }

  /* Coördinaten op het veld */
  .pos-a1 { top: 48%; left: 30%; }
  .pos-a2 { top: 48%; left: 70%; }
  .pos-v1 { bottom: 28%; left: 20%; }
  .pos-v2 { bottom: 28%; left: 50%; }
  .pos-v3 { bottom: 28%; left: 80%; }
  .pos-k  { bottom: 8%; left: 50%; }

</style>
</head>
<body>

<div class="setup-container" id="inputSection">
  <h2>Selectie & Voorkeuren</h2>
  <div id="inputs"></div>
  <div id="errorMsg" class="error">⚠️ Vul minimaal 2 aanvallers en 4 verdedigers/keepers in!</div>
  <button class="main-btn" onclick="genereerOpstelling()">GENEREER OPSTELLINGEN</button>
</div>

<div id="result"></div>

<script>
  // 1. Genereer de 9 invoervelden in blokjes
  const inputsDiv = document.getElementById('inputs');
  for(let i=1; i<=9; i++) {
    inputsDiv.innerHTML += `
      <div class="player-group">
        <div class="player-row">
          <input type="text" id="naam${i}" placeholder="Naam Speler ${i}">
          <select id="pos${i}">
            <option value="verdediging">Verdediger / Keeper</option>
            <option value="aanval">Aanvaller</option>
          </select>
        </div>
        <div class="pinch-wrapper">
            <label class="pinch-checkbox-label">
              <input type="checkbox" id="pinch${i}">
              <span><span class="icon">💪</span>Pinch hitter (vlamt in Kwart 4)</span>
            </label>
        </div>
      </div>
    `;
  }

  // 2. Functies om data op te slaan en te laden (LocalStorage)
  function slaDataOp() {
    for(let i=1; i<=9; i++) {
      localStorage.setItem(`naam${i}`, document.getElementById(`naam${i}`).value);
      localStorage.setItem(`pos${i}`, document.getElementById(`pos${i}`).value);
      localStorage.setItem(`pinch${i}`, document.getElementById(`pinch${i}`).checked);
    }
  }

  function laadData() {
    for(let i=1; i<=9; i++) {
      if(localStorage.getItem(`naam${i}`)) document.getElementById(`naam${i}`).value = localStorage.getItem(`naam${i}`);
      if(localStorage.getItem(`pos${i}`)) document.getElementById(`pos${i}`).value = localStorage.getItem(`pos${i}`);
      if(localStorage.getItem(`pinch${i}`) !== null) document.getElementById(`pinch${i}`).checked = (localStorage.getItem(`pinch${i}`) === 'true');
    }
  }

  // 3. Init: Laad data en zet auto-save aan
  laadData();
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', slaDataOp);
    el.addEventListener('change', slaDataOp);
  });

  // 4. De hoofdlogica voor de opstelling
  function genereerOpstelling() {
    slaDataOp(); // Forceer opslaan bij klik

    let aanvalPinch = []; let aanvalNormaal = [];
    let verdedigingPinch = []; let verdedigingNormaal = [];
    
    // Lees data uit en bewaar ze als objecten (INCLUSIEF keep-teller voor verdedigers!)
    for(let i=1; i<=9; i++) {
      let naam = document.getElementById(`naam${i}`).value.trim();
      let pos = document.getElementById(`pos${i}`).value;
      let isPinch = document.getElementById(`pinch${i}`).checked;

      if(naam !== '') {
        if(pos === 'aanval') {
          if (isPinch) aanvalPinch.push({naam: naam, pinch: true}); 
          else aanvalNormaal.push({naam: naam, pinch: false});
        } else {
          // Voeg een teller toe: 'keepCount' om bij te houden wie hoe vaak heeft gekeept
          if (isPinch) verdedigingPinch.push({naam: naam, pinch: true, keepCount: 0}); 
          else verdedigingNormaal.push({naam: naam, pinch: false, keepCount: 0});
        }
      }
    }

    let aanvallers = [...aanvalPinch, ...aanvalNormaal];
    let verdedigers = [...verdedigingPinch, ...verdedigingNormaal];

    // Validatie
    if(aanvallers.length < 2 || verdedigers.length < 4) {
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }
    document.getElementById('errorMsg').style.display = 'none';

    // UI Wissel
    document.getElementById('inputSection').style.display = 'none';
    window.scrollTo(0,0); // Scroll naar boven

    let resultHTML = '';
    const wisselLabels = ["1e wissel", "2e wissel", "3e wissel"];

    // Genereer 4 kwarten loop
    for(let kwart=1; kwart<=4; kwart++) {
      
      // 1. Basis en Wissels bepalen
      let aanvalBasis = aanvallers.slice(0, 2);
      let aanvalWissel = aanvallers.slice(2);

      let verdedigingBasis = verdedigers.slice(0, 4);
      let verdedigingWissel = verdedigers.slice(4);

      // 2. MAGISCHE Q4 FIX: Forceer Pinch Hitters het veld in!
      if (kwart === 4) {
        for (let i = 0; i < aanvalWissel.length; i++) {
          if (aanvalWissel[i].pinch) {
            let swapIdx = aanvalBasis.length - 1;
            while(swapIdx >= 0 && aanvalBasis[swapIdx].pinch) swapIdx--; 
            if (swapIdx !== -1) {
              let temp = aanvalBasis[swapIdx];
              aanvalBasis[swapIdx] = aanvalWissel[i];
              aanvalWissel[i] = temp;
            }
          }
        }
        for (let i = 0; i < verdedigingWissel.length; i++) {
          if (verdedigingWissel[i].pinch) {
            let swapIdx = verdedigingBasis.length - 1;
            while(swapIdx >= 0 && verdedigingBasis[swapIdx].pinch) swapIdx--; 
            if (swapIdx !== -1) {
              let temp = verdedigingBasis[swapIdx];
              verdedigingBasis[swapIdx] = verdedigingWissel[i];
              verdedigingWissel[i] = temp;
            }
          }
        }
      }

      // 3. EERLIJKE KEEPER KIEZEN
      // Zoek binnen de 4 verdedigers in het veld naar de speler met de minste keepers-beurten
      let keeperIndex = 0;
      let minKeeps = verdedigingBasis[0].keepCount;
      for (let i = 1; i < verdedigingBasis.length; i++) {
        if (verdedigingBasis[i].keepCount < minKeeps) {
          minKeeps = verdedigingBasis[i].keepCount;
          keeperIndex = i;
        }
      }
      
      // Wijs de keeper aan en tel 1 op bij zijn score
      let keeperSpeler = verdedigingBasis[keeperIndex];
      keeperSpeler.keepCount += 1;
      
      // De overige 3 spelers zijn veldverdedigers
      let veldVerdedigers = verdedigingBasis.filter((speler, idx) => idx !== keeperIndex);

      // 4. Toewijzen aan de HTML variabelen
      let a1 = aanvalBasis[0].naam; let a2 = aanvalBasis[1].naam;
      let k1 = keeperSpeler.naam; 
      let v1 = veldVerdedigers[0].naam; let v2 = veldVerdedigers[1].naam; let v3 = veldVerdedigers[2].naam;

      let wissels = [...aanvalWissel.map(p=>p.naam), ...verdedigingWissel.map(p=>p.naam)];

      let wisselsHTML = '';
      wissels.forEach((wisselNaam, index) => {
        wisselsHTML += `<div class="sub-item"><span>${wisselLabels[index] || 'Res.'}</span><strong>${wisselNaam}</strong></div>`;
      });

      resultHTML += `
        <div class="opstelling-wrapper">
          <div class="kwart-titel">Kwart ${kwart}</div>
          <div class="subs-header">${wisselsHTML}</div>
          
          <div class="pitch">
            <div class="box-top"></div><div class="box-bottom"></div>
            <div class="line-center"></div><div class="circle-center"></div>
            <div class="logo">VV<br>MAARSSEN</div>

            <div class="player pos-a1"><div class="shirt"></div><div class="player-name">${a1}</div></div>
            <div class="player pos-a2"><div class="shirt"></div><div class="player-name">${a2}</div></div>
            
            <div class="player pos-v1"><div class="shirt"></div><div class="player-name">${v1}</div></div>
            <div class="player pos-v2"><div class="shirt"></div><div class="player-name">${v2}</div></div>
            <div class="player pos-v3"><div class="shirt"></div><div class="player-name">${v3}</div></div>
            
            <div class="player pos-k"><div class="shirt keeper"></div><div class="keeper-name">${k1}</div></div>
          </div>
        </div>
      `;

      // 5. Roulatie voor het VOLGENDE kwart (Basis sluit aan achter in de rij)
      aanvallers = [...aanvalWissel, ...aanvalBasis];
      verdedigers = [...verdedigingWissel, ...verdedigingBasis];
    }
    
    resultHTML += `<button class="reset-btn" onclick="location.reload()">← Terug naar Selectie</button>`;
    
    document.getElementById('result').innerHTML = resultHTML;
  }
</script>

</body>
</html>
